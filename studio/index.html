<!doctype html>
<html lang="en" data-mode="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23131210'/%3E%3Cg fill='%23E9E5D9'%3E%3Ccircle cx='8' cy='8' r='1.2'/%3E%3Ccircle cx='16' cy='8' r='2.1'/%3E%3Ccircle cx='24' cy='8' r='3'/%3E%3Ccircle cx='8' cy='16' r='2.1'/%3E%3Ccircle cx='16' cy='16' r='3'/%3E%3Ccircle cx='24' cy='16' r='3.8'/%3E%3Ccircle cx='8' cy='24' r='3'/%3E%3Ccircle cx='16' cy='24' r='3.8'/%3E%3Ccircle cx='24' cy='24' r='4.4'/%3E%3C/g%3E%3C/svg%3E">
<title>Halftone UI — studio</title>
<style>
/* Studio chrome — the same print-shop language as the docs: dark ground, mono type, quiet panels.
   The variable blocks mirror docs/index.html exactly (dark :root, cream [data-mode="light"]) so the
   provider reads identical palette values from getComputedStyle in both places. */

:root {
  --bg: #0B0C10;
  --panel: #0F1117;
  --card: #13151C;
  --line: #22242D;
  --line-2: #2C2F3A;
  --ink: #DCDAD1;
  --mut: #8E9099;
  --dim: #5B5E68;
  --accent: #8B7BF0;
  --green: #4E9E6B; --blue: #5580DD; --purple: #8B7BF0; --pink: #C868B0;
  --orange: #C9722F; --red: #C75549; --grey: #8A8D98;
}
html[data-mode="light"] {
  --bg: #EFEBE0; --panel: #E7E2D3; --card: #F5F2E9;
  --line: #D8D2C0; --line-2: #C2BBA6;
  --ink: #26272E; --mut: #5D5E57; --dim: #8F8D7F; --accent: #6553C8;
  --green: #2E7A4C; --blue: #3757B8; --purple: #6553C8; --pink: #A6428C;
  --orange: #A55A1C; --red: #B03A2E; --grey: #6E7078;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 13px; line-height: 1.5;
  overflow: hidden; overscroll-behavior: none;
}
button { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.studio { display: flex; flex-direction: column; height: 100%; }
.main { display: flex; flex: 1; min-height: 0; }

/* ---- topbar ---- */
.topbar {
  display: flex; align-items: center; gap: 10px; height: 52px; padding: 0 16px;
  background: var(--panel); border-bottom: 1px solid var(--line); flex: none;
}
.brand { font-weight: 700; letter-spacing: 0.02em; margin-right: 8px; white-space: nowrap; }
.brand i { font-style: normal; color: var(--accent); }
.topbar .spacer { flex: 1; }
.topbar .group { display: flex; gap: 6px; align-items: center; }
.topbar button {
  background: none; border: 1px solid var(--line-2); color: var(--ink);
  font-size: 12px; padding: 5px 11px; cursor: pointer; white-space: nowrap;
}
.topbar button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.topbar button:disabled { color: var(--dim); border-color: var(--line); cursor: default; }
.topbar button.hero {
  border-color: var(--accent); color: var(--accent); font-weight: 700; letter-spacing: 0.02em;
}
.topbar button.hero:hover:not(:disabled) { background: var(--accent); color: var(--bg); }

/* ---- panels ---- */
.panel {
  flex: none; background: var(--panel); overflow-y: auto; padding: 14px;
}
.panel.left { width: 224px; border-right: 1px solid var(--line); }
.panel.right { width: 264px; border-left: 1px solid var(--line); }
.panel h2 { margin: 0 0 10px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mut); }
.panel h3 { margin: 18px 0 8px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); }
.hint { color: var(--dim); margin: 6px 0; }

/* ---- type case ---- */
.typecase { margin-bottom: 22px; }
.typecase .sorts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.typecase button {
  display: flex; align-items: center; gap: 7px; padding: 7px 8px; cursor: pointer;
  background: var(--card); border: 1px solid var(--line-2); color: var(--ink); font-size: 12px;
}
.typecase button i { font-style: normal; color: var(--accent); width: 1em; text-align: center; }
.typecase button:hover { border-color: var(--accent); }
.typecase.glow button { border-color: var(--accent); }

/* ---- layers ---- */
.layers ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 3px; }
.layers li {
  display: flex; align-items: center; gap: 4px; padding: 4px 6px;
  border: 1px solid transparent; cursor: default;
}
.layers li:hover { border-color: var(--line-2); }
.layers li.selected { border-color: var(--accent); background: var(--card); }
.layers .glyph { font-style: normal; color: var(--accent); width: 1.1em; text-align: center; flex: none; }
.layers .name {
  flex: 1; min-width: 0; background: none; border: 1px solid transparent; color: var(--ink);
  font: inherit; font-size: 12px; padding: 2px 4px;
}
.layers .name:hover, .layers .name:focus { border-color: var(--line-2); background: var(--bg); }
.layers li button {
  background: none; border: 0; color: var(--mut); cursor: pointer; padding: 2px 3px; font-size: 11px; flex: none;
}
.layers li button:hover { color: var(--accent); }
.layers .eye[aria-pressed="false"] { color: var(--dim); }

/* ---- stage: the stone ---- */
.stage {
  position: relative; flex: 1; min-width: 0; overflow: hidden; background: var(--bg);
  background-image: radial-gradient(color-mix(in srgb, var(--ink) 14%, transparent) 1px, transparent 1px);
  background-size: 26px 26px;
  touch-action: none;
}
body.pan .stage { cursor: grab; }
.world { position: absolute; left: 0; top: 0; transform-origin: 0 0; }

.frame {
  position: absolute; background: var(--card); border: 1px solid var(--line);
  cursor: move; overflow: visible;
}
.frame .frame-body { width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
.frame.selected { outline: 1.5px solid var(--accent); outline-offset: 0; }
.handle {
  position: absolute; width: 9px; height: 9px; background: var(--accent);
  border: 1px solid var(--bg); z-index: 2;
}
.handle.nw { left: -5px; top: -5px; cursor: nwse-resize; }
.handle.se { right: -5px; bottom: -5px; cursor: nwse-resize; }
.handle.ne { right: -5px; top: -5px; cursor: nesw-resize; }
.handle.sw { left: -5px; bottom: -5px; cursor: nesw-resize; }

.empty {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; pointer-events: none; color: var(--mut); text-align: center; gap: 2px;
}
.empty p { margin: 0; }
.empty b { color: var(--ink); }

.zoomctl {
  position: absolute; right: 14px; bottom: 14px; display: flex; align-items: center; gap: 5px;
  background: var(--panel); border: 1px solid var(--line-2); padding: 4px 6px;
}
.zoomctl button {
  background: none; border: 1px solid var(--line-2); color: var(--ink);
  font-size: 12px; padding: 2px 8px; cursor: pointer;
}
.zoomctl button:hover { border-color: var(--accent); color: var(--accent); }
.zoomctl .zpct { color: var(--mut); font-size: 11px; min-width: 4ch; text-align: center; }

/* ---- inspector ---- */
.inspector .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field { display: flex; flex-direction: column; gap: 4px; margin: 0 0 10px; }
.field > span { color: var(--mut); font-size: 11px; letter-spacing: 0.04em; }
.field > span em { font-style: normal; color: var(--ink); float: right; }
.field input[type="text"], .field input[type="number"], .field select {
  background: var(--bg); border: 1px solid var(--line-2); color: var(--ink);
  font: inherit; font-size: 12px; padding: 5px 7px; width: 100%;
}
.field input:focus, .field select:focus { border-color: var(--accent); outline: none; }
.field input[type="range"] { width: 100%; accent-color: var(--accent); }

.swatches { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 2px; }
.swatch {
  width: 22px; height: 22px; border: 1px solid var(--line-2); cursor: pointer; padding: 0;
}
.swatch.on { outline: 2px solid var(--accent); outline-offset: 1px; }

.die {
  background: var(--card); border: 1px solid var(--line-2); color: var(--ink);
  padding: 6px 10px; cursor: pointer; width: 100%;
}
.die:hover { border-color: var(--accent); color: var(--accent); }

/* ---- modal ---- */
.scrim {
  position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--bg) 72%, transparent);
}
.modal {
  width: min(680px, 92vw); background: var(--panel); border: 1px solid var(--line-2); padding: 18px;
  display: flex; flex-direction: column; gap: 12px;
}
.modal h2 { margin: 0; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mut); }
.modal textarea {
  width: 100%; height: 300px; resize: vertical; background: var(--bg); color: var(--ink);
  border: 1px solid var(--line-2); font: inherit; font-size: 12px; padding: 10px; white-space: pre;
}
.modal .row { display: flex; gap: 8px; justify-content: flex-end; }
.modal .row button {
  background: none; border: 1px solid var(--line-2); color: var(--ink);
  font-size: 12px; padding: 5px 12px; cursor: pointer;
}
.modal .row button:hover { border-color: var(--accent); color: var(--accent); }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}
</style>
